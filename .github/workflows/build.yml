name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "EdgeMark.xcodeproj/project.pbxproj"
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      build: ${{ steps.check.outputs.build }}
      prerelease: ${{ steps.check.outputs.prerelease }}
      commit_message: ${{ steps.check.outputs.commit_message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version
        id: check
        run: |
          VERSION=$(grep 'MARKETING_VERSION' EdgeMark.xcodeproj/project.pbxproj | head -1 | sed 's/.*= \(.*\);/\1/' | tr -d ' ')
          BUILD=$(grep 'CURRENT_PROJECT_VERSION' EdgeMark.xcodeproj/project.pbxproj | head -1 | sed 's/.*= \(.*\);/\1/' | tr -d ' ')
          COMMIT_MSG=$(git log -1 --pretty=%B | tail -n +2 | tail -n +2)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          git fetch --tags

          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "develop" ]; then
            # Pre-release: auto-increment beta number
            BETA_NUM=1
            while git rev-parse "v${VERSION}-beta.${BETA_NUM}" >/dev/null 2>&1; do
              BETA_NUM=$((BETA_NUM + 1))
            done
            TAG="v${VERSION}-beta.${BETA_NUM}"
            PRERELEASE=true
          else
            # Stable release from main
            TAG="v${VERSION}"
            PRERELEASE=false
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Creating release $TAG (build $BUILD)"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Install SwiftFormat
        run: command -v swiftformat || brew install swiftformat

      - name: Build (arm64 + x86_64)
        run: |
          for ARCH in arm64 x86_64; do
            xcodebuild -project EdgeMark.xcodeproj -scheme EdgeMark -configuration Release \
              -derivedDataPath "build_${ARCH}" \
              ARCHS="${ARCH}" ONLY_ACTIVE_ARCH=NO \
              CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
            strip "build_${ARCH}/Build/Products/Release/EdgeMark.app/Contents/MacOS/EdgeMark" || true
          done

      - name: Create DMGs
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          for ARCH in arm64 x86_64; do
            mkdir -p "dmg_${ARCH}"
            cp -R "build_${ARCH}/Build/Products/Release/EdgeMark.app" "dmg_${ARCH}/"
            ln -s /Applications "dmg_${ARCH}/Applications"
            DMG="EdgeMark-${TAG}-${ARCH}.dmg"
            hdiutil create -volname "EdgeMark" -srcfolder "dmg_${ARCH}" -ov -format UDZO "$DMG"
            shasum -a 256 "$DMG" > "${DMG}.sha256"
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.tag }} (build ${{ needs.check-version.outputs.build }})
          body: ${{ needs.check-version.outputs.commit_message }}
          prerelease: ${{ needs.check-version.outputs.prerelease == 'true' }}
          files: |
            EdgeMark-${{ needs.check-version.outputs.tag }}-arm64.dmg
            EdgeMark-${{ needs.check-version.outputs.tag }}-arm64.dmg.sha256
            EdgeMark-${{ needs.check-version.outputs.tag }}-x86_64.dmg
            EdgeMark-${{ needs.check-version.outputs.tag }}-x86_64.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: [check-version, build]
    if: needs.check-version.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256 files from release
        id: sha
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          for ARCH in arm64 x86_64; do
            gh release download "$TAG" --pattern "EdgeMark-${TAG}-${ARCH}.dmg.sha256" --repo "${{ github.repository }}"
          done
          echo "arm64=$(awk '{print $1}' EdgeMark-${TAG}-arm64.dmg.sha256)" >> $GITHUB_OUTPUT
          echo "x86_64=$(awk '{print $1}' EdgeMark-${TAG}-x86_64.dmg.sha256)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          SHA_ARM64="${{ steps.sha.outputs.arm64 }}"
          SHA_X86_64="${{ steps.sha.outputs.x86_64 }}"

          git clone https://x-access-token:${{ secrets.TAP_GITHUB_TOKEN }}@github.com/Ender-Wang/homebrew-tap.git tap
          cd tap

          mkdir -p Casks
          cat > Casks/edgemark.rb <<CASK
          cask "edgemark" do
            version "$VERSION"

            on_arm do
              sha256 "$SHA_ARM64"
              url "https://github.com/Ender-Wang/EdgeMark/releases/download/v#{version}/EdgeMark-v#{version}-arm64.dmg"
            end

            on_intel do
              sha256 "$SHA_X86_64"
              url "https://github.com/Ender-Wang/EdgeMark/releases/download/v#{version}/EdgeMark-v#{version}-x86_64.dmg"
            end

            name "EdgeMark"
            desc "Native macOS side-panel Markdown notes app"
            homepage "https://github.com/Ender-Wang/EdgeMark"

            depends_on macos: ">= :sequoia"

            app "EdgeMark.app"

            postflight do
              system_command "/usr/bin/xattr", args: ["-cr", "#{appdir}/EdgeMark.app"]
            end
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/edgemark.rb
          git commit -m "Update EdgeMark to v$VERSION"
          git push
